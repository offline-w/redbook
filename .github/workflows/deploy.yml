name: Build and Deploy React App

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: claude/wizardly-wozniak-KLb5q
          path: source

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: source
        run: npm install

      - name: Build
        working-directory: source
        run: npm run build -- --base /redbook/

      - name: Deploy built output to main
        working-directory: target
        run: |
          cp ../source/dist/index.html index.html
          rm -rf assets
          cp -r ../source/dist/assets assets
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "chore: deploy React app [skip ci]"
            git push origin main
          fi
